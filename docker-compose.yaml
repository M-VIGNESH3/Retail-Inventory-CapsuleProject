version: "3.9"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: ricp-reverse-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"                      # EXPOSE ONLY THE PROXY
      # - "443:443"                  # (optional) enable after TLS setup
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: ricp-frontend
    # Serve prebuilt static assets from ./public (as seen in repo)
    volumes:
      - ./public:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - frontend_net
    restart: unless-stopped

  backend:
    image: node:18-alpine
    container_name: ricp-backend
    working_dir: /app
    command: sh -c "npm ci && node server.js"
    volumes:
      - ./:/app                # <— remove :ro so it's read-write
      - backend_node_modules:/app/node_modules
    environment:
      - PORT=3000
    expose:
      - "3000"
    networks:
      - backend_net
    restart: unless-stopped
      # - DB_* variables, etc.
    

volumes:
  backend_node_modules:
