version: "3.9"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: ricp-reverse-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"                      # EXPOSE ONLY THE PROXY
      # - "443:443"                  # (optional) enable after TLS setup
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: ricp-frontend
    # Serve prebuilt static assets from ./public (as seen in repo)
    volumes:
      - ./public:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - frontend_net
    restart: unless-stopped

  backend:
    image: node:18-alpine
    container_name: ricp-backend
    working_dir: /app
    # Install deps once and start
    command: sh -c "npm ci && node server.js"
    volumes:
      - ./:/app:ro                    # mount entire app read-only
      - backend_node_modules:/app/node_modules
    environment:
      # Adjust if server.js reads a different port; 3000 is common
      - PORT=3000
      # If your app uses DB settings, copy from .env.example to .env and:
      # - NODE_ENV=production
      # - DB_* variables, etc.
    expose:
      - "3000"                        # INTERNAL ONLY (NOT PUBLISHED)
    networks:
      - backend_net
    restart: unless-stopped

volumes:
  backend_node_modules:
